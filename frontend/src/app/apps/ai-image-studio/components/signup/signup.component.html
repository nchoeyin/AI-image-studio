<div class="min-h-screen bg-slate-950 text-slate-50 flex flex-col">
  <!-- Optional: reuse navbar -->
  <app-navbar></app-navbar>

  <main class="flex-1 flex items-center justify-center px-4 py-10">
    <div class="max-w-md w-full">
      <!-- Card -->
      <div class="relative overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/80 shadow-2xl shadow-indigo-500/25">
        <!-- Close icon (optional) -->
        <button
          (click)="closeSignupForm()"
          type="button"
          class="absolute right-4 top-4 inline-flex h-8 w-8 items-center justify-center rounded-full bg-slate-800/80 text-slate-400 hover:text-slate-100 hover:bg-slate-700/90 transition">
          ✕
        </button>

        <!-- Content -->
        <div class="px-8 pt-8 pb-6 space-y-6">
          <!-- Logo + title -->
          <div class="flex flex-col items-center gap-3">
            <div class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-indigo-500 text-xl font-bold shadow-lg shadow-indigo-500/40">
              AI
            </div>
            <div class="text-center space-y-1">
              <h1 class="text-2xl font-semibold tracking-tight text-white">
                Sign up 
              </h1>
              <p class="text-xs text-slate-400">
                Get smarter responses and manage your AI image projects in one place.
              </p>
            </div>
          </div>

          <!-- Social buttons -->
          <div class="space-y-3">
            <button
              type="button"
              class="flex w-full items-center justify-center gap-3 rounded-full border border-slate-700 bg-slate-900/70 px-4 py-2.5 text-sm font-medium text-slate-100 hover:bg-slate-800 transition">
              <span class="h-5 w-5 rounded-full bg-slate-800"></span>
              <span>Continue with Google</span>
            </button>

            <button
              type="button"
              class="flex w-full items-center justify-center gap-3 rounded-full border border-slate-700 bg-slate-900/70 px-4 py-2.5 text-sm font-medium text-slate-100 hover:bg-slate-800 transition">
              <span class="h-5 w-5 rounded-full bg-slate-800"></span>
              <span>Continue with Apple</span>
            </button>

            <button
              type="button"
              class="flex w-full items-center justify-center gap-3 rounded-full border border-slate-700 bg-slate-900/70 px-4 py-2.5 text-sm font-medium text-slate-100 hover:bg-slate-800 transition">
              <span class="h-5 w-5 rounded-full bg-slate-800"></span>
              <span>Continue with phone</span>
            </button>
          </div>

          <!-- Divider -->
          <div class="flex items-center gap-3 text-[11px] text-slate-500">
            <div class="h-px flex-1 bg-slate-800"></div>
            <span>OR</span>
            <div class="h-px flex-1 bg-slate-800"></div>
          </div>

          <!-- Email form -->
          <form class="space-y-4">
            <div class="space-y-2">
              <label for="email" class="block text-xs font-medium text-slate-300">
                Email address
              </label>
              <input
                id="email"
                type="email"
                placeholder="you@example.com"
                class="w-full rounded-xl border border-slate-700 bg-slate-950/60 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-500 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
            </div>

            <button
              type="submit"
              class="inline-flex w-full items-center justify-center rounded-full bg-slate-50 px-4 py-2.5 text-sm font-semibold text-slate-900 shadow-sm hover:bg-white transition">
              Continue
            </button>
          </form>

          <!-- Footer text -->
          <p class="pt-1 text-[11px] leading-relaxed text-slate-500 text-center">
            By continuing, you agree to our
            <a href="#" class="text-slate-300 underline underline-offset-2 hover:text-white">Terms</a>
            and
            <a href="#" class="text-slate-300 underline underline-offset-2 hover:text-white">Privacy Policy</a>.
          </p>
        </div>
      </div>

      <!-- Optional small footer below card -->
      <p class="mt-4 text-center text-[11px] text-slate-500">
        © 2026 AI Image Studio
      </p>
    </div>
  </main>

  <!-- Optional shared footer -->
  <!-- <app-footer></app-footer> -->
</div>
